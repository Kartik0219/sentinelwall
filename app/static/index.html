<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SentinelWall SOC Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-mono min-h-screen">
  <header class="border-b border-slate-800 px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold tracking-wide">🛡️ SentinelWall <span class="text-slate-500">SOC Dashboard</span></h1>
    <div id="status-pill" class="px-3 py-1 rounded-full text-sm font-semibold bg-slate-700">Loading…</div>
  </header>

  <main class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
    <section class="bg-slate-900 rounded-lg border border-slate-800 p-4">
      <h2 class="text-lg font-semibold mb-3">Live Alert Ticker</h2>
      <div id="alert-ticker" class="space-y-2 max-h-[28rem] overflow-y-auto text-sm"></div>
    </section>

    <section class="bg-slate-900 rounded-lg border border-slate-800 p-4">
      <h2 class="text-lg font-semibold mb-3">Active Containment (Blocked IPs)</h2>
      <table class="w-full text-sm">
        <thead class="text-slate-400 text-left">
          <tr>
            <th class="py-1">IP Address</th>
            <th class="py-1">Blocked At</th>
            <th class="py-1">TTL Remaining</th>
            <th class="py-1">Source Alert</th>
          </tr>
        </thead>
        <tbody id="blocks-table"></tbody>
      </table>
    </section>
  </main>

  <script src="/js/dashboard.js"></script>
</body>
</html>
